name: Deploy Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: server
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: server
        run: ./gradlew bootJar -x test

      - name: Deploy JAR
        run: sudo cp server/build/libs/*.jar /opt/pixelart/app.jar

      - name: Restart service
        run: sudo systemctl restart pixelart-backend

      - name: Check service status
        run: sudo systemctl status pixelart-backend --no-pager
